name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.build.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Checkout ISO/IEC 80000 source data
        uses: actions/checkout@v7
        with:
          repository: metanorma/iso-iec-80000
          path: iso-iec-80000
          token: ${{ secrets.METANORMA_CI_PAT_TOKEN }}

      - name: Checkout UnitsDB
        uses: actions/checkout@v7
        with:
          repository: unitsml/unitsdb
          path: unitsdb

      - name: Checkout SmartSDU reference docs
        uses: actions/checkout@v7
        with:
          repository: metanorma/sdu-smart
          sparse-checkout: reference-docs
          path: sdu-smart

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: browser/package-lock.json

      - name: Install dependencies
        run: cd browser && npm ci

      - name: Build
        run: cd browser && npm run build

      - name: SPA fallback & .nojekyll
        run: |
          cp browser/dist/index.html browser/dist/404.html
          touch browser/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: browser/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout ISO/IEC 80000 source data
        uses: actions/checkout@v5
        with:
          repository: metanorma/iso-iec-80000
          path: iso-iec-80000
          token: ${{ secrets.METANORMA_CI_PAT_TOKEN }}

      - name: Checkout UnitsDB
        uses: actions/checkout@v5
        with:
          repository: unitsml/unitsdb
          path: unitsdb

      - name: Checkout SmartSDU reference docs
        uses: actions/checkout@v5
        with:
          repository: metanorma/sdu-smart
          sparse-checkout: reference-docs
          path: sdu-smart

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: browser/package-lock.json

      - name: Install dependencies
        run: cd browser && npm ci

      - name: Build
        run: cd browser && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: browser/dist

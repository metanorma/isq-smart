name: Link Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ISO/IEC 80000 source data
        uses: actions/checkout@v4
        with:
          repository: metanorma/iso-iec-80000
          path: iso-iec-80000
          token: ${{ secrets.METANORMA_CI_PAT_TOKEN }}

      - name: Checkout UnitsDB
        uses: actions/checkout@v4
        with:
          repository: unitsml/unitsdb
          path: unitsdb

      - name: Checkout SmartSDU reference docs
        uses: actions/checkout@v4
        with:
          repository: metanorma/sdu-smart
          sparse-checkout: reference-docs
          path: sdu-smart

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: browser/package-lock.json

      - name: Install dependencies
        run: cd browser && npm ci

      - name: Build site
        run: cd browser && npm run build

      - name: Create symlinks for link checking
        run: |
          cd browser/dist/isq-smart
          for item in ../*; do
            name=$(basename "$item")
            [ "$name" = "isq-smart" ] && continue
            [ -e "$name" ] && continue
            ln -s "$item" "$name"
          done

      - name: Link Checker (internal links only)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir "$PWD/browser/dist"
            --no-progress
            --exclude "mailto:"
            --exclude "https?://.*"
            "browser/dist/**/*.html"
          fail: false
